# 2024-02-10 21:50

name: Fork Filter lists

on:
  workflow_dispatch:
  schedule:
    - cron: "30 * * * *"
  
jobs:
  Fork-FLITER-list:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Shanghai'
    
    steps: 
    - name: Checkout target repository
      uses: actions/checkout@v4.1.0
      with:
        repository: axtyet/Quan-X
        path: Quan-X-repo

######
      # 修改脚本链接
    - name: Edit QuantumultX/Chxm1023/Advertising
      run: |
        cd Quan-X-repo/QuantumultX/Chxm1023/Advertising
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/chxm1023\/Advertising\/main/raw.githubusercontent\.com\/axtyet\/Quan-X\/main\/QuantumultX\/Chxm1023\/Advertising/g' "$file"
            else
              echo "$file not found."
            fi
          done
      # 修改脚本链接
    - name: Edit QuantumultX/Chxm1023/Rewrite
      run: |
        cd Quan-X-repo/QuantumultX/Chxm1023/Rewrite
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/chxm1023\/Rewrite\/main/raw.githubusercontent\.com\/axtyet\/Quan-X\/main\/QuantumultX\/Chxm1023\/Rewrite/g' "$file"
            else
              echo "$file not found."
            fi
          done
      # 修改脚本链接
    - name: Edit QuantumultX/Chxm1023/Rewrite/Revenuecat
      run: |
        cd Quan-X-repo/QuantumultX/Chxm1023/Rewrite/Revenuecat
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/chxm1023\/Rewrite\/main\/Revenuecat/raw.githubusercontent\.com\/axtyet\/Quan-X\/main\/QuantumultX\/Chxm1023\/Rewrite\/Revenuecat/g' "$file"
            else
              echo "$file not found."
            fi
          done
      # 修改脚本链接
    - name: Edit QuantumultX/Chxm1023/Rewrite/iTunes
      run: |
        cd Quan-X-repo/QuantumultX/Chxm1023/Rewrite/iTunes
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/chxm1023\/Rewrite\/main\/iTunes/raw.githubusercontent\.com\/axtyet\/Quan-X\/main\/QuantumultX\/Chxm1023\/Rewrite\/iTunes/g' "$file"
            else
              echo "$file not found."
            fi
          done
      # 修改脚本链接
    - name: Edit QuantumultX/Yu9191/Rewrite
      run: |
        cd Quan-X-repo/QuantumultX/Yu9191/Rewrite
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/Yu9191\/Rewrite\/main/raw.githubusercontent\.com\/axtyet\/Quan-X\/main\/QuantumultX\/Yu9191\/Rewrite/g' "$file"
            else
              echo "$file not found."
            fi
          done
      # 修改脚本链接
    - name: Edit QuantumultX/Yu9191/Rewrite/itunes
      run: |
        cd Quan-X-repo/QuantumultX/Yu9191/Rewrite/itunes
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/Yu9191\/Rewrite\/main\/itunes/raw.githubusercontent\.com\/axtyet\/Quan-X\/main\/QuantumultX\/Yu9191\/Rewrite\/itunes/g' "$file"
            else
              echo "$file not found."
            fi
          done
      # 修改脚本链接
    - name: Edit QuantumultX/Yqc007
      run: |
        cd Quan-X-repo/QuantumultX/Yqc007
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/yqc007\/QuantumultX\/master/raw.githubusercontent\.com\/axtyet\/Quan-X\/main\/QuantumultX\/Yqc007/g' "$file"
            else
              echo "$file not found."
            fi
          done


    - name: Add and Commits
      run: |
        cd Quan-X-repo
        if [[ -n $(git status -s) ]]; then
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add QuantumultX/*
          git commit -m "Update some files"
          git push origin HEAD
        else
          echo "No changes to commit."
        fi

    - name: Cleanup Workflow
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2
