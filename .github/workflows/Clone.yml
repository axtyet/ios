######

      # Fork Chxm1023
    - name: Fork Chxm1023/Rewrite
      run: |
        mkdir -p ios-repo/QuantumultX/chxm1023
        git clone -b main https://github.com/chxm1023/Rewrite.git  czy_Tmp
        cp -r czy_Tmp/* ios-repo/QuantumultX/chxm1023/Rewrite
        rm -rf czy_Tmp   
    - name: Edit Chxm1023/Rewrite
      run: |
        cd ios-repo/QuantumultX/chxm1023/Rewrite
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/chxm1023\/Rewrite\/main/raw.githubusercontent\.com\/axtyet\/ios\/main\/QuantumultX\/chxm1023\/Rewrite/g' "$file"
            else
              echo "$file not found."
            fi
          done
